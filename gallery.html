<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Explore Tajikistan</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/main.css">
<link rel="icon" type="image/png" href="assets/favicon.png">
<style>

.gallery-item{
    width:100%;
    height:auto !important;
    aspect-ratio:auto !important;
    object-fit:cover;
    border-radius:20px;
    cursor:pointer;
    transition:0.4s;
    display:block;
}

.gallery-item:hover{
    transform:scale(1.02);
}

</style>

    <style>

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            height: 260px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: 0.4s;
        }

        .gallery-item:hover {
            transform: scale(1.03);
        }

        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 16px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 50px;
            cursor: pointer;
        }

        .lightbox-btn {
            position: absolute;
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            font-size: 40px;
            padding: 12px 22px;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.3s;
        }

        .lightbox-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .prev-btn {
            left: 40px;
        }

        .next-btn {
            right: 40px;
        }

    </style>

</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">

            <div class="logo">
    <img src="assets/logo.png" alt="Explore Tajikistan Logo">
</div>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="cities.html">Cities</a></li>
                <li><a href="nature.html">Nature</a></li>
                <li><a href="culture.html">Culture</a></li>
                <li><a href="food.html">Food</a></li>
                <li><a href="gallery.html">Gallery</a></li>
            </ul>

            <button id="theme-toggle" class="theme-toggle">🌙</button>

        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" style="background:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.60)),
    url('images/gallery-hero.jpg') center/cover no-repeat;">

        <div class="hero-content">
            <h1 class="hero-title">Photo Gallery</h1>
            <p class="hero-subtitle">
                Visual journey through Tajikistan's stunning landscapes and rich culture
            </p>
        </div>

    </section>

    <!-- Gallery -->
    <section class="section">

        <div class="container">

            <h2 class="reveal">Explore Through Images</h2>

           <div class="gallery">

    <img class="gallery-item reveal" src="images/gallery1.jpg" data-image="images/gallery1.jpg">

   

    <img class="gallery-item reveal" src="images/gallery3.jpg" data-image="images/gallery3.jpg">

    <img class="gallery-item reveal" src="images/gallery4.jpg" data-image="images/gallery4.jpg">

    <img class="gallery-item reveal" src="images/gallery5.jpg" data-image="images/gallery5.jpg">

    <img class="gallery-item reveal" src="images/gallery6.jpg" data-image="images/gallery6.jpg">

    <img class="gallery-item reveal" src="images/gallery7.jpg" data-image="images/gallery7.jpg">

    <img class="gallery-item reveal" src="images/gallery8.jpg" data-image="images/gallery8.jpg">

    <img class="gallery-item reveal" src="images/gallery9.jpg" data-image="images/gallery9.jpg">

    <img class="gallery-item reveal" src="images/gallery10.jpg" data-image="images/gallery10.jpg">

   

</div>
            </div>

        </div>

    </section>

    <!-- Lightbox -->

    <div class="lightbox" id="lightbox">

        <span class="close-btn">&times;</span>

        <button class="lightbox-btn prev-btn">&#10094;</button>

        <img id="lightbox-img" src="" alt="Gallery Image">

        <button class="lightbox-btn next-btn">&#10095;</button>

    </div>

    <!-- Footer -->
<footer class="footer">
    <div style="
        text-align: center;
        padding: 25px;
        font-size: 18px;
        font-weight: 500;
    ">
        Created by MISIS students © 2026 Explore Tajikistan
    </div>
</footer>

<script src="js/main.js"></script>
</body>
</html>

    <script src="js/main.js"></script>

    <script>

        const galleryItems = document.querySelectorAll('.gallery-item');

        const lightbox = document.getElementById('lightbox');

        const lightboxImg = document.getElementById('lightbox-img');

        const closeBtn = document.querySelector('.close-btn');

        const nextBtn = document.querySelector('.next-btn');

        const prevBtn = document.querySelector('.prev-btn');

        let currentIndex = 0;

        const images = [];

        galleryItems.forEach((item, index) => {

            images.push(item.dataset.image);

            item.addEventListener('click', () => {

                currentIndex = index;

                showImage();

            });

        });

        function showImage() {

            lightbox.style.display = 'flex';

            lightboxImg.src = images[currentIndex];

        }

        function nextImage() {

            currentIndex = (currentIndex + 1) % images.length;

            showImage();

        }

        function prevImage() {

            currentIndex = (currentIndex - 1 + images.length) % images.length;

            showImage();

        }

        nextBtn.addEventListener('click', nextImage);

        prevBtn.addEventListener('click', prevImage);

        closeBtn.addEventListener('click', () => {

            lightbox.style.display = 'none';

        });

        lightbox.addEventListener('click', (e) => {

            if(e.target === lightbox) {

                lightbox.style.display = 'none';

            }

        });

        document.addEventListener('keydown', (e) => {

            if(lightbox.style.display === 'flex') {

                if(e.key === 'ArrowRight') {

                    nextImage();

                }

                if(e.key === 'ArrowLeft') {

                    prevImage();

                }

                if(e.key === 'Escape') {

                    lightbox.style.display = 'none';

                }

            }

        });

    </script>

</body>
</html>
